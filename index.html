<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简介卡片</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="background"></div>
    
    <div class="card-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar">
                    <img src="avatar-placeholder.png" alt="个人头像"> 
                </div>
                <h1>Exodus</h1>
            </div>
            
            <p class="bio">
                Aenean ornare velit aliquam varius enim ullam
                corper a magna aliquam facilisis ante, sed
                etiam magna <a href="#">interdum congue</a>.
            </p>
            
            <div class="links-section">
                <a href="#" class="link-button"><i class="fab fa-twitter"></i> Twitter</a>
                <a href="#" class="link-button"><i class="fab fa-instagram"></i> Instagram</a>
                <a href="#" class="link-button"><i class="fab fa-pinterest"></i> Pinterest</a>
                <a href="#" class="link-button"><i class="fab fa-tiktok"></i> TikTok</a>
                <a href="#" class="link-button"><i class="fab fa-reddit-alien"></i> Reddit</a>
            </div>
            
            <div class="social-icons">
                <a href="#" aria-label="Github"><i class="fab fa-github"></i></a>
                <a href="#" aria-label="Discord"><i class="fab fa-discord"></i></a>
                <a href="#" aria-label="WeChat"><i class="fab fa-weixin"></i></a>
                <a href="#" aria-label="Chat"><i class="fas fa-comment"></i></a>
                <a href="#" aria-label="Email"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </div>
</body>
</html>
