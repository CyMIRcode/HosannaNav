<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Hosanna</title>
    <meta name="keywords" content="Hosanna link">
    <meta name="description" content="Hosanna link">
    
    <link rel="stylesheet" type="text/css" href="css/style.css">

    <style>
        /* 核心修复：确保 Canvas 能够接收全局鼠标事件 */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2; /* 置于最底层 */
            display: block;
        }

        /* 装饰层必须设置穿透，否则会像一堵墙挡住鼠标信号 */
        .landscape, .filter {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none; 
        }

        /* 内容容器设置为穿透，保证鼠标滑动时直接作用于底层的 Canvas */
        .content {
            position: relative;
            z-index: 10;
            pointer-events: none; 
        }

        /* 恢复具体的文字和按钮的点击功能 */
        .title, .description, .navigation__item a {
            pointer-events: auto; 
        }

        /* 版权信息：同样设置为穿透，不干扰鼠标特效 */
        .footer-copyright {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-family: Arial, sans-serif;
            letter-spacing: 1px;
            z-index: 5;
            pointer-events: none;
            user-select: none;
        }

        /* 响应式微调 */
        @media (max-width: 768px) {
            .footer-copyright {
                font-size: 10px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div class="filter"></div>
    <div class="landscape"></div>

    <div class="content">
        <div class="title">Hosanna!</div>
        <div class="description">盛年不重来，一日难再晨。及时当勉励，岁月不待人。</div>

        <nav class="cover-navigation cover-navigation--primary">
            <ul class="navigation">
                <li class="navigation__item"><a href="https://www.hosanna.top/" target="_blank" title="首页">首页</a></li>
                <li class="navigation__item"><a href="https://blog.hosanna.top/" target="_blank" title="Hosanna 中文博客">Hosanna</a></li>
                <li class="navigation__item"><a href="https://exod.us.kg/" target="_blank" title="每日圣言">每日圣言</a></li>
                <li class="navigation__item"><a href="https://holy.exod.us.kg/" target="_blank" title="我信">我信</a></li>
                <li class="navigation__item"><a href="https://exds.eu.org/" title="Exds">Exds</a></li>
            </ul>
        </nav>
    </div>

    <div class="footer-copyright">
        Copyright &copy; 2025 - <span id="year"></span> Hosanna. All Rights Reserved.
    </div>

    <script type="text/javascript" src="js/sky.js"></script>
    <script>
        // 自动年份逻辑
        const yearSpan = document.getElementById('year');
        if(yearSpan) {
            yearSpan.textContent = new Date().getFullYear();
        }

        /* 小提示：如果特效仍不灵敏，请确保 sky.js 内部没有阻止事件冒泡。
           该代码已通过 pointer-events 实现了“视觉在文字上，交互在背景上”的无缝效果。
        */
    </script>

</body>
</html>
