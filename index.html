<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=11">
    <title>Hosanna Nav</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <style>
        /* 1. 导航布局 */
        .navigation {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0;
            margin: 20px auto;
            list-style: none;
            max-width: 800px; 
            width: 100%;
        }

        .navigation__item {
            flex: 0 0 20%; 
            box-sizing: border-box;
            padding: 10px 0px; 
            display: flex !important;
            justify-content: center;
            float: none !important;
        }

        .navigation__item a {
            display: inline-block;
            min-width: 110px;
            max-width: 160px;
            padding: 8px 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 20px;
            color: #fff;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 2. 画布设置：去掉 background，设为透明 */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* 提高一点层级，但要低于 content */
            pointer-events: none;
            background: transparent !important; 
        }

        /* 3. 确保内容在特效之上 */
        .content {
            position: relative;
            z-index: 10;
        }

        .my-copyright {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            z-index: 999;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .navigation__item { flex: 0 0 33.33%; }
        }
    </style>
</head>
<body>
    <div class="landscape"></div>
    <div class="filter"></div>
    
    <canvas id="canvas"></canvas>

    <div class="content">
        <div class="title">Hosanna Nav</div>
        <div class="discription">盛年不重来，一日难再晨。及时当勉励，岁月不待人。</div>
        <nav class="cover-navigation cover-navigation--primary">
            <ul class="navigation">
                <li class="navigation__item"><a href="https://hosanna.top/" target="_blank">贺撒纳 博客</a></li>
                <li class="navigation__item"><a href="https://nva.hosanna.top/" target="_blank">贺撒纳 导航</a></li>
                <li class="navigation__item"><a href="https://exod.us.kg/" target="_blank">每日圣言</a></li>
                <li class="navigation__item"><a href="https://holy.exod.us.kg/" target="_blank">我信</a></li>
                <li class="navigation__item"><a href="https://holy.exod.us.kg/" target="_blank">我信</a></li>
                <li class="navigation__item"><a href="https://www.vaticannews.va/zh.html/" target="_blank">梵蒂冈新闻网</a></li>
                <li class="navigation__item"><a href="https://www.vaticannews.va/zh/prayers.html/" target="_blank">祈祷经文</a></li>
                <li class="navigation__item"><a href="https://www.vaticannews.va/zh/podcast/daily-chinese-news.html/" target="_blank">每日播客</a></li>
            </ul>
        </nav>
    </div>

    <div class="my-copyright">
        Copyright &copy; 2025 - <span id="cur-year"></span> Hosanna. All Rights Reserved.
    </div>

    <script>
        document.getElementById('cur-year').innerText = new Date().getFullYear();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let ripples = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            ripples.push({
                x: e.clientX,
                y: e.clientY,
                radius: 2,
                opacity: 1
            });
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < ripples.length; i++) {
                let r = ripples[i];
                r.radius += 2;   
                r.opacity -= 0.02; 

                if (r.opacity <= 0) {
                    ripples.splice(i, 1);
                    i--;
                    continue;
                }

                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${r.opacity})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
