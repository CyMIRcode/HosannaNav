<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Hosanna</title>
    <meta name="keywords" content="Hosanna link">
    <meta name="description" content="Hosanna link">
    
    <link rel="stylesheet" type="text/css" href="css/style.css">

    <style>
        /* 确保版权信息样式美观且不干扰交互 */
        .footer-copyright {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5); /* 半透明白，适配星空背景 */
            font-size: 12px;
            font-family: "Microsoft YaHei", sans-serif;
            letter-spacing: 0.5px;
            z-index: 9999; /* 确保在最上层 */
            pointer-events: none; /* 穿透点击，不影响背景交互 */
        }

        /* 修复可能存在的层级冲突，确保文字内容可点击 */
        .content {
            position: relative;
            z-index: 100;
        }

        /* 移动端简单适配 */
        @media (max-width: 768px) {
            .footer-copyright {
                font-size: 10px;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="title">Hosanna!</div>

        <div class="description">盛年不重来，一日难再晨。及时当勉励，岁月不待人。</div>

        <nav class="cover-navigation cover-navigation--primary">
            <ul class="navigation">
                <li class="navigation__item"><a href="https://www.hosanna.top/" target="_blank" title="首页">首页</a></li>
                <li class="navigation__item"><a href="https://blog.hosanna.top/" target="_blank" title="Hosanna 中文博客">Hosanna</a></li>
                <li class="navigation__item"><a href="https://exod.us.kg/" target="_blank" title="每日圣言">每日圣言</a></li>
                <li class="navigation__item"><a href="https://holy.exod.us.kg/" target="_blank" title="我信">我信</a></li>
                <li class="navigation__item"><a href="https://exds.eu.org/" title="Exds">Exds</a></li>
            </ul>
        </nav>
    </div>

    <div class="landscape"></div>
    <div class="filter"></div>
    <canvas id="canvas"></canvas>

    <div class="footer-copyright">
        Copyright &copy; 2025 - <span id="year"></span> Hosanna. All Rights Reserved.
    </div>

    <script type="text/javascript" src="js/sky.js"></script>
    <script>
        // 自动获取当前年份并填充
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>

</body>
</html>
